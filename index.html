<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stone Target XR Prototype</title>
    <link rel="stylesheet" href="./styles.css">
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main id="app">
      <canvas id="scene"></canvas>

      <section class="hud" aria-label="Game controls">
        <div class="status-row">
          <div>
            <p class="label">Score</p>
            <p id="score" class="value">0</p>
          </div>
          <div>
            <p class="label">Result</p>
            <p id="result" class="value">Ready</p>
          </div>
        </div>

        <label class="control">
          <span>Aim left/right</span>
          <input id="aim-x" type="range" min="-2.5" max="2.5" value="0" step="0.05">
        </label>

        <label class="control">
          <span>Aim up/down</span>
          <input id="aim-y" type="range" min="0.5" max="2.8" value="1.45" step="0.05">
        </label>

        <label class="control">
          <span>Power</span>
          <input id="power" type="range" min="7" max="18" value="12" step="0.25">
        </label>

        <div class="actions">
          <button id="throw-button" type="button">Throw</button>
          <button id="reset-button" type="button">Reset</button>
        </div>

        <p id="xr-status" class="xr-status">Checking XR support...</p>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
